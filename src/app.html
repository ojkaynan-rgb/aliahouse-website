<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Default SEO (overridden per-page via svelte:head) -->
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://aliahouse.com/" />

		<!-- Open Graph / social sharing (overridden per-page) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Alia House" />
		<meta property="og:image" content="https://aliahouse.com/og-image.jpg" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Alia House — Family-ready city hotel across Europe" />

		<!-- Twitter / X card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@aliahouse" />
		<meta name="twitter:image" content="https://aliahouse.com/og-image.jpg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
